---
# AppImages downloaded and placed inside the distrobox home.
# Each entry: dest filename + URL. Bump dl_lmstudio_version when you want
# the install_appimages role to refresh it.

dl_appimage_dir: "{{ dl_box_home }}/Apps"

# LM Studio — fetch the current AppImage. Version string is what lmstudio.ai
# uses in its URL paths; verify at https://lmstudio.ai/download before bumping.
dl_lmstudio_version: "0.3.35-1"
dl_lmstudio_url: "https://releases.lmstudio.ai/linux/x86/{{ dl_lmstudio_version }}/LM-Studio-{{ dl_lmstudio_version }}-x64.AppImage"
dl_lmstudio_dest: "{{ dl_appimage_dir }}/LM-Studio.AppImage"
